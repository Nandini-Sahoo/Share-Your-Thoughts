[build]
  command = "npm run build"
  publish = "build"

# IMPORTANT: API redirects MUST come before the catch-all redirect
[[redirects]]
  from = "/api/*"
  to = "https://share-your-thoughts-backend-f9ww.onrender.com/api/:splat"
  status = 200
  force = true

# This catch-all must come AFTER the API redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200